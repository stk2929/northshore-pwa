// ═══════════ GENERATE 14 DAYS FROM TODAY ═══════════
function buildDays(){
  const now=new Date();const days=[];
  const dn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fl=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const fm=["January","February","March","April","May","June","July","August","September","October","November","December"];
  // Start 2 days ago so user can see yesterday
  for(let i=-2;i<12;i++){
    const d=new Date(now);d.setDate(d.getDate()+i);
    const key=mn[d.getMonth()].toLowerCase()+d.getDate();
    days.push({key,dow:dn[d.getDay()],d:d.getDate(),m:mn[d.getMonth()],label:fl[d.getDay()],full:`${fl[d.getDay()]}, ${fm[d.getMonth()]} ${d.getDate()}`,today:i===0,dateObj:new Date(d)});
  }
  return days;
}
const DAYS=buildDays();

// Build events for a given day
function getEventsForDay(dayObj){
  const dow=dayObj.dow;
  const base=(BASE_RECURRING[dow]||[]).map(e=>({...e,id:e.id+dayObj.d*1000}));
  const daily=DAILY_EVENTS.map(e=>({...e,id:e.id+dayObj.d*1000}));
  return [...base,...daily];
}

// localStorage helpers

// ═══════════ DATE STRIP ═══════════
function DateStrip({days,sel,onSel}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){const idx=days.findIndex(d=>d.key===sel);const el=ref.current.children[idx];if(el)el.scrollIntoView({inline:"center",behavior:"smooth",block:"nearest"})}},[sel]);
  return <div ref={ref} style={{display:"flex",gap:6,padding:"8px 16px 6px",overflowX:"auto",WebkitOverflowScrolling:"touch",flexShrink:0}}>
    {days.map(d=>{const on=d.key===sel;const evts=getEventsForDay(d);const ct=evts.length;
      return <button key={d.key} onClick={()=>onSel(d.key)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 6px 10px",minWidth:50,borderRadius:16,border:on?`2px solid ${P.burgundy}`:d.today?`2px dashed ${P.lavender}`:`1.5px solid transparent`,cursor:"pointer",background:on?P.burgundy:d.today?P.lavPale:"transparent",flexShrink:0,WebkitAppearance:"none"}}>
        <span style={{fontSize:10,fontWeight:700,color:on?"#ffffff90":d.today?P.lavender:P.textLight,textTransform:"uppercase",letterSpacing:".06em"}}>{d.dow}</span>
        <span style={{fontSize:20,fontWeight:800,color:on?P.white:P.text,fontFamily:"'Playfair Display',serif",lineHeight:1}}>{d.d}</span>
        <span style={{fontSize:9,fontWeight:700,color:on?"#ffffff70":P.textLight}}>{d.m}</span>
        {ct>0&&<div style={{display:"flex",gap:2,marginTop:2}}>
          {ct<=5?Array.from({length:Math.min(ct,5)}).map((_,i)=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:on?"#ffffff80":P.coral}}/>):
          <span style={{fontSize:9,fontWeight:700,color:on?"#ffffffcc":P.coral}}>{ct}</span>}
        </div>}
        {d.today&&!on&&<div style={{position:"absolute",bottom:2,width:4,height:4,borderRadius:"50%",background:P.burgundy}}/>}
      </button>;
    })}
  </div>;
}

// ═══════════ MAIN APP ═══════════
function App(){
  const [tab,setTab]=useState("cal");
  const [selDay,setSelDay]=useState(todayKey);
  const [cat,setCat]=useState("all");
  const [town,setTown]=useState("All Towns");
  const [age,setAge]=useState("All Ages");
  const [saved,setSaved]=useState(()=>loadSaved());
  const [exp,setExp]=useState(null);
  const [showF,setShowF]=useState(false);
  const [showT,setShowT]=useState(false);
  const [search,setSearch]=useState("");

  // Persist saves
  useEffect(()=>{saveSaved(saved)},[saved]);

  const toggle=useCallback(id=>{setSaved(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})},[]);

  const dayObj=DAYS.find(d=>d.key===selDay)||DAYS[2];
  const dayEvts=getEventsForDay(dayObj);

  const filt=arr=>arr.filter(e=>{
    if(cat!=="all"&&e.cat!==cat)return false;
    if(town!=="All Towns"&&e.town!==town)return false;
    if(age!=="All Ages"&&e.age!==age&&e.age!=="Family")return false;
    if(search){const q=search.toLowerCase();if(!e.title.toLowerCase().includes(q)&&!e.loc.toLowerCase().includes(q)&&!(e.desc||"").toLowerCase().includes(q))return false}
    return true;
  });
  const filtered=filt(dayEvts);
  const allEvts=DAYS.flatMap(d=>getEventsForDay(d));
  const sl=allEvts.filter(e=>saved.has(e.id));
  const af=[cat!=="all",town!=="All Towns",age!=="All Ages"].filter(Boolean).length;
  const clr=()=>{setCat("all");setTown("All Towns");setAge("All Ages");setSearch("")};

  // Swipe
  const touchStart=useRef(null);
  const onTS=e=>{touchStart.current=e.touches[0].clientX};
  const onTE=e=>{if(!touchStart.current)return;const diff=touchStart.current-e.changedTouches[0].clientX;if(Math.abs(diff)>60){const ci=DAYS.findIndex(d=>d.key===selDay);if(diff>0&&ci<DAYS.length-1){setSelDay(DAYS[ci+1].key);setExp(null)}if(diff<0&&ci>0){setSelDay(DAYS[ci-1].key);setExp(null)}}touchStart.current=null};

  const ci=DAYS.findIndex(d=>d.key===selDay);
  const goPrev=()=>{if(ci>0){setSelDay(DAYS[ci-1].key);setExp(null)}};
  const goNext=()=>{if(ci<DAYS.length-1){setSelDay(DAYS[ci+1].key);setExp(null)}};

  const safeTop="env(safe-area-inset-top, 20px)";
  const safeBot="env(safe-area-inset-bottom, 0px)";

  const pages={
    cal:<div onTouchStart={onTS} onTouchEnd={onTE} style={{minHeight:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px 6px"}}>
        <button onClick={goPrev} disabled={ci===0} style={{width:38,height:38,borderRadius:12,border:`1.5px solid ${ci===0?P.warmDark:P.burgundy}`,background:P.white,cursor:ci===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:ci===0?P.warmDark:P.burgundy,opacity:ci===0?.4:1,WebkitAppearance:"none"}}>‹</button>
        <div style={{textAlign:"center",flex:1}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:800,color:P.text,fontFamily:"'Playfair Display',serif"}}>{dayObj.today?"Today":dayObj.label}</h2>
          <p style={{margin:"2px 0 0",fontSize:12,color:P.textLight}}>{dayObj.full} · {filtered.length} activities</p>
        </div>
        <button onClick={goNext} disabled={ci===DAYS.length-1} style={{width:38,height:38,borderRadius:12,border:`1.5px solid ${ci===DAYS.length-1?P.warmDark:P.burgundy}`,background:P.white,cursor:ci===DAYS.length-1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:ci===DAYS.length-1?P.warmDark:P.burgundy,opacity:ci===DAYS.length-1?.4:1,WebkitAppearance:"none"}}>›</button>
      </div>
      <div style={{display:"flex",gap:8,padding:"4px 20px 8px",overflowX:"auto"}}>
        {[{n:filtered.filter(e=>e.free).length,l:"Free",c:P.sage,b:P.sagePale},{n:filtered.filter(e=>e.src==="localBiz").length,l:"Local Biz",c:P.burgundy,b:P.burgBg},{n:filtered.filter(e=>e.featured).length,l:"Featured",c:P.lavender,b:P.lavPale}].map((x,i)=>x.n>0?<div key={i} style={{padding:"6px 14px",borderRadius:20,background:x.b,display:"flex",alignItems:"center",gap:6,flexShrink:0}}><span style={{fontSize:16,fontWeight:800,color:x.c,fontFamily:"'Playfair Display',serif"}}>{x.n}</span><span style={{fontSize:11,fontWeight:600,color:x.c}}>{x.l}</span></div>:null)}
      </div>
      <div style={{padding:"4px 20px 0"}}>{filtered.length===0?<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:40,marginBottom:12}}>🌸</div><p style={{fontSize:16,color:P.textLight}}>{dayEvts.length===0?"No events this day":"No matches for your filters"}</p>{af>0&&<button onClick={clr} style={{marginTop:8,padding:"8px 20px",borderRadius:20,border:"none",background:P.burgundy,color:"#FFF",fontWeight:600,fontSize:13,cursor:"pointer"}}>Clear Filters</button>}</div>:filtered.map(e=><Card key={e.id} e={e} saved={saved.has(e.id)} onSave={toggle} expanded={exp===e.id} onToggle={()=>setExp(exp===e.id?null:e.id)}/>)}</div>
    </div>,
    saved:<div>
      <div style={{padding:"0 20px",marginBottom:16}}><h1 style={{margin:0,fontSize:28,fontWeight:800,color:P.text,fontFamily:"'Playfair Display',serif"}}>Saved <span style={{color:P.coral}}>♥</span></h1><p style={{margin:"4px 0 0",fontSize:13,color:P.textLight}}>{sl.length} saved</p></div>
      <div style={{padding:"0 20px"}}>{sl.length===0?<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:40,marginBottom:12}}>🌷</div><p style={{fontSize:16,color:P.textLight}}>Tap hearts to save activities</p></div>:sl.map(e=><Card key={e.id} e={e} saved={true} onSave={toggle} expanded={exp===e.id} onToggle={()=>setExp(exp===e.id?null:e.id)}/>)}</div>
    </div>,
    sources:<div>

        <div style={{background:P.white,borderRadius:16,border:`1.5px solid ${P.warmDark}`,overflow:"hidden"}}>{sources.map((x,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:i<sources.length-1?`1px dashed ${P.warmDark}`:"none"}}><div style={{fontSize:14,fontWeight:600,color:P.text}}>{x.name}</div><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:P.sage}}/><span style={{fontSize:11,fontWeight:600,color:P.sage}}>Active</span></div></div>)}</div>
      </div>})}</div>
    </div>,
  };

  return <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:P.cream,position:"relative",overflow:"hidden"}}>
    {/* Safe area top spacer */}
    <div style={{paddingTop:safeTop,flexShrink:0,background:P.cream}}/>
    {/* Search */}
    <div style={{display:"flex",gap:10,alignItems:"center",padding:"8px 20px 4px",flexShrink:0}}>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,background:P.white,borderRadius:24,padding:"10px 16px",border:`1.5px solid ${P.warmDark}`}}>
        <span style={{fontSize:14,color:P.textLight}}>✿</span>

      </div>
      <button onClick={()=>setShowF(!showF)} style={{width:42,height:42,borderRadius:14,background:showF?P.burgundy:P.white,border:`1.5px solid ${showF?P.burgundy:P.warmDark}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,position:"relative",flexShrink:0,color:showF?"#FFF":P.textMed,WebkitAppearance:"none"}}>⚙{af>0&&<span style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,borderRadius:8,background:P.coral,color:"#FFF",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${P.cream}`}}>{af}</span>}</button>

    {tab==="cal"&&<DateStrip days={DAYS} sel={selDay} onSel={k=>{setSelDay(k);setExp(null)}}/>}
    {/* Stripe */}
    <div style={{height:3,margin:"4px 20px 0",borderRadius:2,background:stripeBg(`${P.lavender}30`,`${P.pink}20`,8),flexShrink:0}}/>
    {/* Content */}
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",paddingTop:8,paddingBottom:`calc(80px + ${safeBot})`,WebkitOverflowScrolling:"touch"}}>{pages[tab]}</div>
    {/* Tab bar */}
    <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:10}}>
      <div style={{height:6,background:`radial-gradient(circle 6px at 6px 0, transparent 5.5px, ${P.white}ee 6px) 0 0 / 12px 6px repeat-x`,marginBottom:-1}}/>
      <div style={{background:`${P.white}ee`,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",padding:`6px 0 calc(8px + ${safeBot})`,display:"flex",justifyContent:"space-around"}}>
        {[{id:"cal",l:"Explore",i:"✿",a:"🌸"},{id:"saved",l:"Saved",i:"♡",a:"♥"},{id:"sources",l:"Sources",i:"🔗",a:"🔗"}].map(t=><button key={t.id} onClick={()=>{setTab(t.id);setExp(null)}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 16px",opacity:tab===t.id?1:.4,position:"relative",WebkitAppearance:"none"}}>
          <span style={{fontSize:24}}>{tab===t.id?t.a:t.i}</span>
          <span style={{fontSize:10,fontWeight:700,color:tab===t.id?P.burgundy:P.textLight}}>{t.l}</span>
          {t.id==="saved"&&saved.size>0&&<span style={{position:"absolute",top:-2,right:2,width:16,height:16,borderRadius:"50%",background:P.coral,color:"#FFF",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{saved.size}</span>}
        </button>)}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>

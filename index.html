function formatDateStr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function buildDays(){
  const now=new Date();const days=[];
  const dn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const fl=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const fm=["January","February","March","April","May","June","July","August","September","October","November","December"];
  for(let i=-2;i<12;i++){
    const d=new Date(now);d.setDate(d.getDate()+i);
    const key=mn[d.getMonth()].toLowerCase()+d.getDate();
    days.push({key,dow:dn[d.getDay()],d:d.getDate(),m:mn[d.getMonth()],label:fl[d.getDay()],full:`${fl[d.getDay()]}, ${fm[d.getMonth()]} ${d.getDate()}`,today:i===0,dateObj:new Date(d),dateStr:formatDateStr(d)});
  }
  return days;
}

// ═══════════ TICKETMASTER INTEGRATION ═══════════
const TM_CATEGORY_MAP={
  "Children's Theatre":"theater","Circus & Specialty Acts":"theater","Magic & Illusion":"theater",
  "Puppetry":"theater","Ice Shows":"sports","Children's Music":"music","Dance":"dance",
  "Ballet":"dance","Fine Art":"arts","Craft":"arts","Comedy":"social","Festival":"social",
  "Community/Civic":"social","Family":"social","Fairs & Festivals":"outdoors","Spectacular":"social",
  "Children's":"social","Miscellaneous":"social","Undefined":"social",
  "Theatre":"theater","Music":"music","Arts & Theatre":"theater","Film":"social",
};

function matchTown(cityName){
  if(!cityName)return null;
  const lower=cityName.toLowerCase().trim();
  const exact=TOWNS.find(t=>t!=="All Towns"&&t.toLowerCase()===lower);
  if(exact)return exact;
  const partial=TOWNS.find(t=>t!=="All Towns"&&lower.includes(t.toLowerCase()));
  return partial||cityName;
}

function tmTimeToDisplay(localTime){
  if(!localTime)return"TBD";
  const[h,m]=localTime.split(":");
  const hr=parseInt(h);const mn=m||"00";
  if(hr===0)return`12:${mn} AM`;
  if(hr<12)return`${hr}:${mn} AM`;
  if(hr===12)return`12:${mn} PM`;
  return`${hr-12}:${mn} PM`;
}

function mapTicketmasterEvent(tmEvent){
  try{
    const venue=tmEvent._embedded?.venues?.[0];
    const cls=tmEvent.classifications?.[0];
    const genre=cls?.genre?.name||cls?.segment?.name||"Family";
    const prices=tmEvent.priceRanges;
    const isFree=!prices||prices.length===0||(prices[0].min===0&&(!prices[0].max||prices[0].max===0));
    let cost=null;
    if(prices&&prices.length>0&&!isFree){
      const p=prices[0];
      cost=p.min===p.max?`$${p.min}`:`$${p.min}–$${p.max}`;
    }
    const cat=TM_CATEGORY_MAP[genre]||TM_CATEGORY_MAP[cls?.segment?.name]||"social";
    const town=matchTown(venue?.city?.name);
    const addr=[venue?.address?.line1,venue?.city?.name,venue?.state?.stateCode].filter(Boolean).join(", ");
    return{
      id:"tm-"+tmEvent.id,
      title:tmEvent.name,
      loc:venue?.name||"Venue TBD",
      addr:addr||null,
      town:town,
      time:tmTimeToDisplay(tmEvent.dates?.start?.localTime),
      end:null,
      cat:cat,
      age:"Family",
      src:"ticketmaster",
      desc:(tmEvent.info||tmEvent.description||"").substring(0,250)||`${genre} event at ${venue?.name||"venue TBD"}.`,
      free:isFree,
      cost:cost,
      spots:null,
      indoor:true,
      tags:[genre!=="Undefined"?genre:null,venue?.name?null:null].filter(Boolean),
      url:tmEvent.url,
      featured:false,
      _source:"ticketmaster",
      _date:tmEvent.dates?.start?.localDate,
      _img:tmEvent.images?.find(i=>i.ratio==="16_9"&&i.width>=500)?.url||tmEvent.images?.[0]?.url||null,
    };
  }catch(e){
    console.warn("TM map error:",e,tmEvent);
    return null;
  }
}

async function fetchTicketmasterEvents(){
  const{TM_BASE_URL,TICKETMASTER_API_KEY,TM_PARAMS}=DATA_CONFIG;
  if(!TICKETMASTER_API_KEY)return[];
  const now=new Date();
  const end=new Date(now);end.setDate(end.getDate()+13);
  const startDT=now.toISOString().split(".")[0]+"Z";
  const endDT=end.toISOString().split(".")[0]+"Z";
  const params=new URLSearchParams({...TM_PARAMS,apikey:TICKETMASTER_API_KEY,startDateTime:startDT,endDateTime:endDT});
  const resp=await fetch(`${TM_BASE_URL}?${params}`);
  if(!resp.ok)throw new Error(`TM API ${resp.status}`);
  const json=await resp.json();
  const events=json._embedded?.events||[];
  return events.map(mapTicketmasterEvent).filter(Boolean);
}

// ═══════════ REMOTE CURATED JSON ═══════════
async function fetchRemoteCuratedEvents(){
  const{REMOTE_JSON_URL}=DATA_CONFIG;
  if(!REMOTE_JSON_URL)return[];
  const resp=await fetch(REMOTE_JSON_URL);
  if(!resp.ok)throw new Error(`Remote JSON ${resp.status}`);
  const json=await resp.json();
  return(json.events||[]).map(e=>({...e,id:"remote-"+e.id,_source:"community-json"}));
}

// ═══════════ CACHING ═══════════
function getCachedData(key){
  try{
    const raw=localStorage.getItem(key);
    if(!raw)return null;
    const{data,fetchedAt}=JSON.parse(raw);
    const ttl=key===DATA_CONFIG.CACHE_KEYS.remote?DATA_CONFIG.CACHE_TTL.remote:DATA_CONFIG.CACHE_TTL.ticketmaster;
    return{data,fetchedAt,isExpired:Date.now()-fetchedAt>ttl};
  }catch(e){return null}
}
function setCachedData(key,data){
  try{localStorage.setItem(key,JSON.stringify({data,fetchedAt:Date.now()}))}catch(e){
    try{localStorage.removeItem(DATA_CONFIG.CACHE_KEYS.ticketmaster);localStorage.setItem(key,JSON.stringify({data,fetchedAt:Date.now()}))}catch(e2){}
  }
}

// ═══════════ DEDUPLICATION ═══════════
function dedupKey(event){
  const title=(event.title||"").toLowerCase().replace(/[^a-z0-9]/g,"").substring(0,30);
  const loc=(event.loc||"").toLowerCase().replace(/[^a-z0-9]/g,"").substring(0,20);
  return`${title}|${loc}`;
}
function deduplicateEvents(events){
  const seen=new Map();
  for(const event of events){
    const key=dedupKey(event);
    if(seen.has(key)){
      const existing=seen.get(key);
      // Curated wins over everything
      if(existing._source==="curated")continue;
      if(event._source==="curated"){seen.set(key,event);continue}
      // community-json wins over ticketmaster
      if(existing._source==="community-json")continue;
      continue;
    }
    seen.set(key,event);
  }
  return Array.from(seen.values());
}

// ═══════════ BUILD EVENTS FOR A DAY (merges curated + live) ═══════════
function getCuratedEventsForDay(dayObj){
  const dow=dayObj.dow;
  const dateStr=dayObj.dateStr;
  const base=(BASE_RECURRING[dow]||[]).map(e=>({...e,id:e.id+dayObj.d*1000,_source:"curated"}));
  const daily=DAILY_EVENTS.map(e=>({...e,id:e.id+dayObj.d*1000,_source:"curated"}));
  const dateSpecific=DATE_SPECIFIC_EVENTS.filter(e=>e._date===dateStr).map(e=>({...e,id:e.id+dayObj.d*1000,_source:"curated"}));
  return[...dateSpecific,...base,...daily];
}

function getMergedEventsForDay(dayObj,liveEvents){
  const curated=getCuratedEventsForDay(dayObj);
  const dateStr=dayObj.dateStr;
  const live=(liveEvents||[]).filter(e=>e._date===dateStr);
  return deduplicateEvents([...curated,...live]);
}

// ═══════════ useEventData HOOK ═══════════
function useEventData(){
  const[liveEvents,setLiveEvents]=useState([]);
  const[loadingState,setLoadingState]=useState("idle"); // idle|loading|refreshing|error
  const[lastUpdated,setLastUpdated]=useState(null);
  const[liveCount,setLiveCount]=useState(0);
  const timerRef=useRef(null);
  const mountedRef=useRef(true);

  const refreshData=useCallback(async(state)=>{
    if(!mountedRef.current)return;
    setLoadingState(state||"refreshing");
    try{
      const results=await Promise.allSettled([fetchRemoteCuratedEvents(),fetchTicketmasterEvents()]);
      if(!mountedRef.current)return;
      const remoteEvents=results[0].status==="fulfilled"?results[0].value:[];
      const tmEvents=results[1].status==="fulfilled"?results[1].value:[];
      if(remoteEvents.length>0)setCachedData(DATA_CONFIG.CACHE_KEYS.remote,remoteEvents);
      if(tmEvents.length>0)setCachedData(DATA_CONFIG.CACHE_KEYS.ticketmaster,tmEvents);
      const allLive=[...remoteEvents,...tmEvents];
      const bothFailed=results[0].status==="rejected"&&results[1].status==="rejected";
      if(allLive.length>0){
        setLiveEvents(allLive);setLiveCount(allLive.length);
        setLastUpdated(Date.now());setLoadingState("idle");
      }else if(bothFailed){
        setLoadingState("error");
        // Log for debugging
        console.warn("NS Kids: Both data sources failed",results[0].reason,results[1].reason);
      }else{
        setLoadingState("idle");
      }
    }catch(e){
      if(mountedRef.current)setLoadingState("error");
      console.warn("NS Kids: refresh error",e);
    }
  },[]);

  useEffect(()=>{
    mountedRef.current=true;
    // Boot: load from cache
    const cachedRemote=getCachedData(DATA_CONFIG.CACHE_KEYS.remote);
    const cachedTM=getCachedData(DATA_CONFIG.CACHE_KEYS.ticketmaster);
    const initialLive=[...(cachedRemote?.data||[]),...(cachedTM?.data||[])];
    if(initialLive.length>0){
      setLiveEvents(initialLive);setLiveCount(initialLive.length);
      setLastUpdated(Math.max(cachedRemote?.fetchedAt||0,cachedTM?.fetchedAt||0));
    }
    // Fetch fresh in background
    refreshData(initialLive.length>0?"refreshing":"loading");
    // Auto-refresh
    timerRef.current=setInterval(()=>refreshData("refreshing"),DATA_CONFIG.REFRESH_INTERVAL);
    return()=>{mountedRef.current=false;clearInterval(timerRef.current)};
  },[refreshData]);

  const getEvents=useCallback((dayObj)=>getMergedEventsForDay(dayObj,liveEvents),[liveEvents]);

  return{getEvents,loadingState,lastUpdated,liveCount,refreshData:()=>refreshData("refreshing")};
}

function DataStatus({loadingState,lastUpdated,liveCount}){
  if(loadingState==="idle"&&!lastUpdated)return null;
  const msgs={
    loading:{text:"Loading live events...",bg:P.lavPale,color:P.lavender,icon:"↻",spin:true},
    refreshing:{text:"Updating events...",bg:P.sagePale,color:P.sage,icon:"↻",spin:true},
    error:{text:"Using cached data",bg:P.coralBg,color:P.coral,icon:"⚡",spin:false},
    idle:null,

  const msg=msgs[loadingState];
  if(!msg&&lastUpdated){
    const ago=Math.round((Date.now()-lastUpdated)/60000);
    if(ago<2)return liveCount>0?<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"4px 16px",fontSize:11,fontWeight:600,color:P.sage}}>

          {e.free&&<span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,color:P.sage,background:P.sagePale,border:`1px solid ${P.sage}20`}}>Free</span>}
          {low&&<span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,color:P.coral,background:P.coralBg}}>{e.spots} left</span>}
          {isTM&&<span style={{padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:600,color:P.teal,background:P.tealBg,border:`1px solid ${P.teal}20`}}>Live</span>}
        </div>
        <button onClick={ev=>{ev.stopPropagation();onSave(e.id)}} style={{background:"none",border:"none",cursor:"pointer",padding:6,fontSize:22,color:saved?P.coral:"#D8CFC8",transform:saved?"scale(1.15)":"scale(1)",transition:"all .2s"}}>{saved?"♥":"♡"}</button>
      </div>
      <h3 style={{margin:"0 0 6px",fontSize:17,fontWeight:700,color:P.text,fontFamily:"'Playfair Display',serif",lineHeight:1.35}}>{e.title}</h3>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
        <span style={{fontSize:13,color:P.burgundy,fontWeight:600}}>{e.time}{e.end?` – ${e.end}`:""}</span>
        <span style={{color:P.warmDark}}>·</span><span style={{fontSize:13,color:P.textMed}}>{e.town}</span>
      </div>
      <p style={{margin:0,fontSize:13,color:P.textLight}}>📍 {e.loc}</p>
      {expanded&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px dashed ${P.warmDark}`}}>
        {e.desc&&<p style={{margin:"0 0 14px",fontSize:14,color:P.textMed,lineHeight:1.65}}>{e.desc}</p>}
        <div style={{background:P.warm,borderRadius:16,padding:"14px 16px",marginBottom:14,border:`1px solid ${P.warmDark}`}}>
          <Det icon="📍" label="Address" value={e.addr}/><Det icon="🕐" label="Time" value={`${e.time}${e.end?` – ${e.end}`:""}`}/><Det icon="👶" label="Ages" value={e.age==="Family"?"All ages":`Ages ${e.age}`}/><Det icon="💐" label="Cost" value={e.free?"Free":e.cost}/>{e.spots&&<Det icon="🪑" label="Spots" value={`${e.spots} remaining`}/>}<Det icon={e.indoor?"🏠":"🌿"} label="Setting" value={e.indoor?"Indoor":"Outdoor"}/>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{e.tags?.map((t,i)=><span key={i} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:500,color:P.textMed,background:P.warm,border:`1px solid ${P.warmDark}`}}>{t}</span>)}</div>
        <div style={{display:"flex",gap:8}}>
          <button style={{flex:1,padding:"13px 0",borderRadius:24,border:"none",background:P.burgundy,color:"#FFF",fontWeight:700,fontSize:15,cursor:"pointer"}} onClick={ev=>{ev.stopPropagation();if(e.url){window.open(e.url,"_blank")}else if(e.addr){window.open(`https://maps.apple.com/?q=${encodeURIComponent(e.addr)}`)}}}>{e.url?(e.free?"More Info":"Register · "+(e.cost||"")):(e.free?"Open in Maps":"Register · "+(e.cost||""))}</button>
          {e.addr&&<button style={{padding:"13px 18px",borderRadius:24,border:`1.5px solid ${P.warmDark}`,background:P.white,color:P.textMed,fontWeight:600,fontSize:15,cursor:"pointer"}} onClick={ev=>{ev.stopPropagation();window.open(`https://maps.apple.com/?q=${encodeURIComponent(e.addr)}`)}} >Maps</button>}
          <button style={{padding:"13px 18px",borderRadius:24,border:`1.5px solid ${P.warmDark}`,background:P.white,color:P.textMed,fontWeight:600,fontSize:15,cursor:"pointer"}} onClick={ev=>{ev.stopPropagation();if(navigator.share){navigator.share({title:e.title,text:`${e.title} at ${e.loc} — ${e.time}`,url:e.url||""})}}} >Share</button>
        </div>
      </div>}
    </div>
  </div>;
}

function DateStrip({days,sel,onSel,getEvents}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){const idx=days.findIndex(d=>d.key===sel);const el=ref.current.children[idx];if(el)el.scrollIntoView({inline:"center",behavior:"smooth",block:"nearest"})}},[sel]);
  return <div ref={ref} style={{display:"flex",gap:6,padding:"8px 16px 6px",overflowX:"auto",WebkitOverflowScrolling:"touch",flexShrink:0}}>
    {days.map(d=>{const on=d.key===sel;const ct=getEvents(d).length;
      return <button key={d.key} onClick={()=>onSel(d.key)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 6px 10px",minWidth:50,borderRadius:16,border:on?`2px solid ${P.burgundy}`:d.today?`2px dashed ${P.lavender}`:`1.5px solid transparent`,cursor:"pointer",background:on?P.burgundy:d.today?P.lavPale:"transparent",flexShrink:0,WebkitAppearance:"none"}}>
        <span style={{fontSize:10,fontWeight:700,color:on?"#ffffff90":d.today?P.lavender:P.textLight,textTransform:"uppercase",letterSpacing:".06em"}}>{d.dow}</span>
        <span style={{fontSize:20,fontWeight:800,color:on?P.white:P.text,fontFamily:"'Playfair Display',serif",lineHeight:1}}>{d.d}</span>
        <span style={{fontSize:9,fontWeight:700,color:on?"#ffffff70":P.textLight}}>{d.m}</span>
        {ct>0&&<div style={{display:"flex",gap:2,marginTop:2}}>
          {ct<=5?Array.from({length:Math.min(ct,5)}).map((_,i)=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:on?"#ffffff80":P.coral}}/>):
          <span style={{fontSize:9,fontWeight:700,color:on?"#ffffffcc":P.coral}}>{ct}</span>}
        </div>}
        {d.today&&!on&&<div style={{position:"absolute",bottom:2,width:4,height:4,borderRadius:"50%",background:P.burgundy}}/>}
      </button>;
    })}
  </div>;
}

// ═══════════ MAIN APP ═══════════
function App(){
  const [tab,setTab]=useState("cal");
  const [selDay,setSelDay]=useState(todayKey);
  const [cat,setCat]=useState("all");
  const [town,setTown]=useState("All Towns");
  const [age,setAge]=useState("All Ages");
  const [saved,setSaved]=useState(()=>loadSaved());
  const [exp,setExp]=useState(null);
  const [showF,setShowF]=useState(false);
  const [showT,setShowT]=useState(false);
  const [search,setSearch]=useState("");
  const [sortBy,setSortBy]=useState("default"); // "default" | "time" | "free"

  // Live data hook
  const {getEvents,loadingState,lastUpdated,liveCount,refreshData}=useEventData();

  useEffect(()=>{saveSaved(saved)},[saved]);
  const toggle=useCallback(id=>{setSaved(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})},[]);

  const dayObj=DAYS.find(d=>d.key===selDay)||DAYS[2];
  const dayEvts=getEvents(dayObj);

  const parseTime=t=>{if(!t||t==="TBD")return 9999;const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 9999;let h=parseInt(m[1]);const mn=parseInt(m[2]);const pm=m[3].toUpperCase()==="PM";if(pm&&h!==12)h+=12;if(!pm&&h===12)h=0;return h*60+mn};
  const filt=arr=>arr.filter(e=>{
    if(cat!=="all"&&e.cat!==cat)return false;
    if(town!=="All Towns"&&e.town!==town)return false;
    if(age!=="All Ages"&&e.age!==age&&e.age!=="Family")return false;
    if(search){const q=search.toLowerCase();if(!e.title.toLowerCase().includes(q)&&!e.loc.toLowerCase().includes(q)&&!(e.desc||"").toLowerCase().includes(q))return false}
    return true;
  });
  const sortEvents=arr=>{if(sortBy==="time")return[...arr].sort((a,b)=>parseTime(a.time)-parseTime(b.time));if(sortBy==="free")return[...arr].sort((a,b)=>(b.free?1:0)-(a.free?1:0)||(parseTime(a.time)-parseTime(b.time)));return arr};
  const filtered=sortEvents(filt(dayEvts));
  const allEvts=DAYS.flatMap(d=>getEvents(d));
  const sl=allEvts.filter(e=>saved.has(e.id));
  const af=[cat!=="all",town!=="All Towns",age!=="All Ages"].filter(Boolean).length;
  const clr=()=>{setCat("all");setTown("All Towns");setAge("All Ages");setSearch("")};

  // Swipe
  const touchStart=useRef(null);
  const onTS=e=>{touchStart.current=e.touches[0].clientX};
  const onTE=e=>{if(!touchStart.current)return;const diff=touchStart.current-e.changedTouches[0].clientX;if(Math.abs(diff)>60){const ci=DAYS.findIndex(d=>d.key===selDay);if(diff>0&&ci<DAYS.length-1){setSelDay(DAYS[ci+1].key);setExp(null)}if(diff<0&&ci>0){setSelDay(DAYS[ci-1].key);setExp(null)}}touchStart.current=null};

  const ci=DAYS.findIndex(d=>d.key===selDay);
  const goPrev=()=>{if(ci>0){setSelDay(DAYS[ci-1].key);setExp(null)}};
  const goNext=()=>{if(ci<DAYS.length-1){setSelDay(DAYS[ci+1].key);setExp(null)}};

  const safeTop="env(safe-area-inset-top, 20px)";
  const safeBot="env(safe-area-inset-bottom, 0px)";

  // Count live vs curated
  const liveCt=filtered.filter(e=>e._source==="ticketmaster"||e._source==="community-json").length;
  const curatedCt=filtered.filter(e=>e._source==="curated").length;

  const pages={
    cal:<div onTouchStart={onTS} onTouchEnd={onTE} style={{minHeight:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px 6px"}}>
        <button onClick={goPrev} disabled={ci===0} style={{width:38,height:38,borderRadius:12,border:`1.5px solid ${ci===0?P.warmDark:P.burgundy}`,background:P.white,cursor:ci===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:ci===0?P.warmDark:P.burgundy,opacity:ci===0?.4:1,WebkitAppearance:"none"}}>‹</button>
        <div style={{textAlign:"center",flex:1}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:800,color:P.text,fontFamily:"'Playfair Display',serif"}}>{dayObj.today?"Today":dayObj.label}</h2>
          <p style={{margin:"2px 0 0",fontSize:12,color:P.textLight}}>{dayObj.full} · {filtered.length} activities{liveCt>0?` (${liveCt} live)`:""}</p>
        </div>
        <button onClick={goNext} disabled={ci===DAYS.length-1} style={{width:38,height:38,borderRadius:12,border:`1.5px solid ${ci===DAYS.length-1?P.warmDark:P.burgundy}`,background:P.white,cursor:ci===DAYS.length-1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:ci===DAYS.length-1?P.warmDark:P.burgundy,opacity:ci===DAYS.length-1?.4:1,WebkitAppearance:"none"}}>›</button>
      </div>
      <div style={{display:"flex",gap:8,padding:"4px 20px 8px",overflowX:"auto",alignItems:"center"}}>
        {[{n:filtered.filter(e=>e.free).length,l:"Free",c:P.sage,b:P.sagePale},{n:filtered.filter(e=>e.src==="localBiz").length,l:"Local Biz",c:P.burgundy,b:P.burgBg},{n:filtered.filter(e=>e.featured).length,l:"Featured",c:P.lavender,b:P.lavPale},{n:liveCt,l:"Live",c:P.teal,b:P.tealBg}].map((x,i)=>x.n>0?<div key={i} style={{padding:"6px 14px",borderRadius:20,background:x.b,display:"flex",alignItems:"center",gap:6,flexShrink:0}}><span style={{fontSize:16,fontWeight:800,color:x.c,fontFamily:"'Playfair Display',serif"}}>{x.n}</span><span style={{fontSize:11,fontWeight:600,color:x.c}}>{x.l}</span></div>:null)}
        <div style={{marginLeft:"auto",flexShrink:0}}><button onClick={()=>setSortBy(s=>s==="default"?"time":s==="time"?"free":"default")} style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${sortBy!=="default"?P.burgundy:P.warmDark}`,background:sortBy!=="default"?P.burgBg:P.white,cursor:"pointer",display:"flex",alignItems:"center",gap:4,WebkitAppearance:"none"}}><span style={{fontSize:11,fontWeight:600,color:sortBy!=="default"?P.burgundy:P.textLight}}>⏱ {sortBy==="time"?"By Time":sortBy==="free"?"Free First":"Sort"}</span></button></div>
      </div>
      <div style={{padding:"4px 20px 0"}}>{filtered.length===0?<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:40,marginBottom:12}}>🌸</div><p style={{fontSize:16,color:P.textLight}}>{dayEvts.length===0?"No events this day":"No matches for your filters"}</p>{af>0&&<button onClick={clr} style={{marginTop:8,padding:"8px 20px",borderRadius:20,border:"none",background:P.burgundy,color:"#FFF",fontWeight:600,fontSize:13,cursor:"pointer"}}>Clear Filters</button>}</div>:filtered.map(e=><Card key={e.id} e={e} saved={saved.has(e.id)} onSave={toggle} expanded={exp===e.id} onToggle={()=>setExp(exp===e.id?null:e.id)}/>)}</div>
    </div>,
    saved:<div>
      <div style={{padding:"0 20px",marginBottom:16}}><h1 style={{margin:0,fontSize:28,fontWeight:800,color:P.text,fontFamily:"'Playfair Display',serif"}}>Saved <span style={{color:P.coral}}>♥</span></h1><p style={{margin:"4px 0 0",fontSize:13,color:P.textLight}}>{sl.length} saved</p></div>
      <div style={{padding:"0 20px"}}>{sl.length===0?<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:40,marginBottom:12}}>🌷</div><p style={{fontSize:16,color:P.textLight}}>Tap hearts to save activities</p></div>:sl.map(e=><Card key={e.id} e={e} saved={true} onSave={toggle} expanded={exp===e.id} onToggle={()=>setExp(exp===e.id?null:e.id)}/>)}</div>
    </div>,
    sources:<div>
      <div style={{padding:"0 20px",marginBottom:16}}><h1 style={{margin:0,fontSize:28,fontWeight:800,color:P.text,fontFamily:"'Playfair Display',serif"}}>Sources 🔗</h1><p style={{margin:"4px 0 0",fontSize:13,color:P.textLight}}>{SOURCES_LIST.length} curated + live feeds</p></div>
      <div style={{padding:"0 20px"}}>
        {/* Live Sources */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:16}}>🎫</span><span style={{fontSize:14,fontWeight:700,fontFamily:"'Playfair Display',serif",color:P.text}}>Live Data Feeds</span></div>
          <div style={{background:P.white,borderRadius:16,border:`1.5px solid ${P.warmDark}`,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:DATA_CONFIG.REMOTE_JSON_URL?`1px dashed ${P.warmDark}`:"none"}}>
              <div><div style={{fontSize:14,fontWeight:600,color:P.text}}>Ticketmaster Events</div><div style={{fontSize:11,color:P.textLight}}>Family events within 25mi</div></div>
              <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:loadingState==="error"?P.coral:DATA_CONFIG.TICKETMASTER_API_KEY?P.sage:P.warmDark}}/><span style={{fontSize:11,fontWeight:600,color:loadingState==="error"?P.coral:DATA_CONFIG.TICKETMASTER_API_KEY?P.sage:P.textLight}}>{loadingState==="error"?"Retry...":DATA_CONFIG.TICKETMASTER_API_KEY?"Active":"No key"}</span></div>
            </div>
            {DATA_CONFIG.REMOTE_JSON_URL&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px"}}>
              <div><div style={{fontSize:14,fontWeight:600,color:P.text}}>Community Updates</div><div style={{fontSize:11,color:P.textLight}}>Curated JSON feed</div></div>
              <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:P.sage}}/><span style={{fontSize:11,fontWeight:600,color:P.sage}}>Active</span></div>
            </div>}
          </div>
          {lastUpdated&&<div style={{marginTop:6,fontSize:11,color:P.textLight,textAlign:"center"}}>
            {liveCount} live events loaded · Last refresh: {new Date(lastUpdated).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
            <button onClick={refreshData} style={{marginLeft:8,background:"none",border:"none",color:P.teal,fontWeight:700,fontSize:11,cursor:"pointer",textDecoration:"underline",WebkitAppearance:"none"}}>Refresh now</button>
          </div>}
        </div>
        {/* Curated Sources */}
        {Object.entries(SOURCES_LIST.reduce((g,x)=>{(g[x.type]=g[x.type]||[]).push(x);return g},{})).map(([type,sources])=>{const st=SRC[type]||SRC.community;return <div key={type} style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:16}}>{st.icon}</span><span style={{fontSize:14,fontWeight:700,fontFamily:"'Playfair Display',serif",color:P.text}}>{st.label}s</span><span style={{fontSize:11,color:P.textLight}}>{sources.length}</span></div>
          <div style={{background:P.white,borderRadius:16,border:`1.5px solid ${P.warmDark}`,overflow:"hidden"}}>{sources.map((x,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:i<sources.length-1?`1px dashed ${P.warmDark}`:"none"}}><div style={{fontSize:14,fontWeight:600,color:P.text}}>{x.name}</div><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:P.sage}}/><span style={{fontSize:11,fontWeight:600,color:P.sage}}>Active</span></div></div>)}</div>
        </div>})}
      </div>
    </div>,
  };

  return <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:P.cream,position:"relative",overflow:"hidden"}}>
    <div style={{paddingTop:safeTop,flexShrink:0,background:P.cream}}/>
    {/* Search */}
    <div style={{display:"flex",gap:10,alignItems:"center",padding:"8px 20px 4px",flexShrink:0}}>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,background:P.white,borderRadius:24,padding:"10px 16px",border:`1.5px solid ${P.warmDark}`}}>

      <button onClick={()=>setShowF(!showF)} style={{width:42,height:42,borderRadius:14,background:showF?P.burgundy:P.white,border:`1.5px solid ${showF?P.burgundy:P.warmDark}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,position:"relative",flexShrink:0,color:showF?"#FFF":P.textMed,WebkitAppearance:"none"}}>⚙{af>0&&<span style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,borderRadius:8,background:P.coral,color:"#FFF",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${P.cream}`}}>{af}</span>}</button>
    </div>
    {/* Town */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"2px 20px",flexShrink:0}}>
      <button onClick={()=>setShowT(!showT)} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:P.burgundy,WebkitAppearance:"none"}}>📍 {town} <span style={{fontSize:10,color:P.textLight}}>{showT?"▲":"▼"}</span></button>
      {dayObj.today&&tab==="cal"&&<span style={{fontSize:11,fontWeight:700,color:P.sage,background:P.sagePale,padding:"2px 10px",borderRadius:20}}>Today</span>}
    </div>
    {showT&&<div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"6px 20px",flexShrink:0}}>{TOWNS.map(t=><button key={t} onClick={()=>{setTown(t);setShowT(false)}} style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${town===t?P.burgundy:P.warmDark}`,cursor:"pointer",fontSize:12,fontWeight:600,background:town===t?P.burgundy:P.white,color:town===t?"#FFF":P.textMed,WebkitAppearance:"none"}}>{t}</button>)}</div>}
    {showF&&<div style={{padding:"6px 20px",borderTop:`1px dashed ${P.warmDark}`,flexShrink:0}}><div style={{fontSize:10,fontWeight:700,color:P.textLight,textTransform:"uppercase",letterSpacing:".08em",marginBottom:4}}>Age Group</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{AGE_GROUPS.map(a=><button key={a} onClick={()=>setAge(a)} style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${age===a?P.sage:P.warmDark}`,cursor:"pointer",fontSize:12,fontWeight:600,background:age===a?P.sage:P.white,color:age===a?"#FFF":P.textMed,WebkitAppearance:"none"}}>{a}</button>)}</div></div>}

      <div style={{height:6,background:`radial-gradient(circle 6px at 6px 0, transparent 5.5px, ${P.white}ee 6px) 0 0 / 12px 6px repeat-x`,marginBottom:-1}}/>
      <div style={{background:`${P.white}ee`,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",padding:`6px 0 calc(8px + ${safeBot})`,display:"flex",justifyContent:"space-around"}}>
        {[{id:"cal",l:"Explore",i:"✿",a:"🌸"},{id:"saved",l:"Saved",i:"♡",a:"♥"},{id:"sources",l:"Sources",i:"🔗",a:"🔗"}].map(t=><button key={t.id} onClick={()=>{setTab(t.id);setExp(null)}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 16px",opacity:tab===t.id?1:.4,position:"relative",WebkitAppearance:"none"}}>
          <span style={{fontSize:24}}>{tab===t.id?t.a:t.i}</span>
          <span style={{fontSize:10,fontWeight:700,color:tab===t.id?P.burgundy:P.textLight}}>{t.l}</span>
          {t.id==="saved"&&saved.size>0&&<span style={{position:"absolute",top:-2,right:2,width:16,height:16,borderRadius:"50%",background:P.coral,color:"#FFF",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{saved.size}</span>}
        </button>)}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
